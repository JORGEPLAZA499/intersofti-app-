  <style>
    /* Critical CSS: paint a clean white shell immediately so users never see
       a black screen while the app loads. React replaces #root on mount. */
    html, body { margin: 0; padding: 0; background: #ffffff; color: #0f172a; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #initial-hero { position: fixed; inset: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #initial-hero .fallback { opacity: 0; transition: opacity .3s ease; color: #64748b; font-size: 14px; }
    #initial-hero .fallback.visible { opacity: 1; }
  </style>
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-Nuusja-alPR25dsrCgo0-.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>

  <body>
    <div id="root"><div id="initial-hero"><div class="fallback" id="initial-fallback">Cargando…</div></div></div>
    <script>
      // Show a subtle "Cargando…" message if React hasn't mounted within 3s,
      // so users in incognito / with strict privacy settings don't see a pure
      // black screen if a third-party resource (fonts, etc.) is blocked.
      setTimeout(function () {
        var el = document.getElementById('initial-fallback');
        if (el && document.getElementById('initial-hero')) el.className = 'fallback visible';
      }, 3000);
    </script>
    <noscript>

      </div>
    </noscript>

  </body>
